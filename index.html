<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ardha Kalkulus</title>

    <link rel="stylesheet" href="style.css">

    <!-- Library Math.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.1/math.min.js"></script>
</head>

<body>

<div class="container">

    <h1>Ardha Kalkulus</h1>
    <p class="subjudul">
        Kalkulator Kalkulus Sederhana
    </p>

    <label>Masukkan Fungsi f(x)</label>

    <input
        type="text"
        id="fungsi"
        placeholder="Contoh: x^2 + 3*x"
    >

    <label>Nilai x (Opsional)</label>

    <input
        type="number"
        id="nilaiX"
        placeholder="Contoh: 2"
    >

    <div class="button-group">

        <button onclick="turunan()">
            Turunan
        </button>

        <button onclick="integral()">
            Integral
        </button>

        <button onclick="hitung()">
            Hitung Nilai
        </button>

        <button class="hapus" onclick="hapusData()">
            Hapus
        </button>

    </div>

    <h3>Hasil</h3>

    <div id="hasil">
        Silakan masukkan fungsi.
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
